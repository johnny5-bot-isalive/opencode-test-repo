name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: |
          if command -v shellcheck &>/dev/null; then
            shellcheck scripts/*.sh 2>&1 || true
          else
            echo "shellcheck not installed, skipping"
          fi
      - name: Run hadolint
        if: false  # enable when Dockerfile added
        run: echo "hadolint step placeholder"
      - name: Lint-markdown
        run: |
          if command -v mdl &>/dev/null; then
            mdl .
          else
            echo "mdl not installed, skipping markdown lint"
          fi

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test environment
        run: |
          echo "Node: $(node --version 2>/dev/null || echo 'not installed')"
          echo "Python: $(python3 --version 2>/dev/null || echo 'not installed')"
          echo "Shell: $SHELL"
      - name: Run project tests
        run: |
          for f in scripts/test-*.sh; do
            [ -x "$f" ] && bash "$f" && echo "PASS: $f" || echo "FAIL: $f"
          done
          if [ ! -f scripts/test-*.sh ]; then
            echo "No test scripts found in scripts/"
          fi
